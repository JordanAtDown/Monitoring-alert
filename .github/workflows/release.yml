name: Release

on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: monitoring-alert-windows-x64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifact/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
                  | sed '/^[[:space:]]*$/d' | head -c 65000)
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"

      - name: Package installer archive
        run: |
          DIR="monitoring-alert-v${VERSION}-windows-x64"
          mkdir "$DIR"
          cp artifact/monitoring-alert.exe "$DIR/"
          cp scripts/config.toml scripts/install.bat scripts/update.bat scripts/uninstall.bat scripts/Register-Tasks.ps1 "$DIR/"
          zip -r "${DIR}.zip" "$DIR/"
          echo "ARCHIVE=${DIR}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.notes.outputs.body }}
        run: |
          echo "$RELEASE_NOTES" > release_notes.md
          gh release create "$TAG" \
            --title "MonitoringAlert $TAG" \
            --notes-file release_notes.md \
            "artifact/monitoring-alert.exe#monitoring-alert.exe" \
            "$ARCHIVE"
