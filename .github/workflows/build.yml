name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Format & Lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "monitoring-alert -> target"

      - name: Check formatting
        working-directory: monitoring-alert
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: monitoring-alert
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build Release
    runs-on: windows-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "monitoring-alert -> target"

      - name: Build (release)
        working-directory: monitoring-alert
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-alert-windows-x64
          path: monitoring-alert/target/x86_64-pc-windows-msvc/release/monitoring-alert.exe
          retention-days: 7
          if-no-files-found: error

  test:
    name: Tests
    runs-on: windows-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "monitoring-alert -> target"

      - name: Run tests
        working-directory: monitoring-alert
        run: cargo test --target x86_64-pc-windows-msvc

  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [check, build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: monitoring-alert-windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: monitoring-alert.exe
